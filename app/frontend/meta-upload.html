<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meta-uppladdning</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/meta-upload.css" />
</head>
<body>
  <main class="meta-shell">
    <section class="meta-panel" aria-labelledby="meta-title">
      <div class="meta-brand">
        <img src="/flow-logo.svg" alt="" />
        <span>flow</span>
      </div>
      <h1 id="meta-title">Meta-uppladdning</h1>

      <form id="metaUploadForm" class="meta-upload-form">
        <label class="meta-dropzone" id="metaDropzone">
          <input id="metaFiles" name="files" type="file" accept="image/*,video/*" multiple />
          <span class="meta-dropzone-title">Välj bilder eller videor</span>
          <span class="meta-dropzone-subtitle">Flera filer går bra - uppladdning startar direkt</span>
        </label>

        <div id="metaFileList" class="meta-file-list" aria-live="polite"></div>

        <div id="metaProgress" class="meta-progress-panel" hidden>
          <div class="meta-progress-head">
            <span id="metaProgressLabel">Laddar upp</span>
            <strong id="metaProgressPercent">0%</strong>
          </div>
          <div class="meta-progress-track" aria-hidden="true">
            <div id="metaProgressBar" class="meta-progress-bar"></div>
          </div>
          <div id="metaProgressRemaining" class="meta-progress-remaining"></div>
        </div>

      </form>

      <div id="metaStatus" class="meta-status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="/js/meta_upload.js"></script>
</body>
</html>
