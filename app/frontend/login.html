<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in – Bemanning</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-box">
    <h2>Logga in</h2>
    <form id="login-form">
      <label for="username">Användarnamn</label>
      <input id="username" name="username" autocomplete="username" required />

      <label for="password">Lösenord</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button class="primary" type="submit">Logga in</button>
      <div class="err" id="err" hidden></div>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const errEl = document.getElementById("err");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      try {
        await api.post("/api/auth/login", {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        });
        window.location.href = "/index.html";
      } catch (err) {
        errEl.textContent = err.message || "Inloggning misslyckades";
        errEl.hidden = false;
      }
    });

    // Om redan inloggad – skicka till startsida
    (async () => {
      try {
        await api.get("/api/auth/me");
        window.location.href = "/index.html";
      } catch (_) { /* inte inloggad – stanna kvar */ }
    })();
  </script>
</body>
</html>
