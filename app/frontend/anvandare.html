<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Användare – Bemanning</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="topbar"></header>

  <section class="controls">
    <button class="primary" id="new-user">+ Ny användare</button>
    <label><input type="checkbox" id="show-inactive" /> Visa inaktiva</label>
  </section>

  <main>
    <div class="section-title">Användare</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Användarnamn</th>
            <th>Visningsnamn</th>
            <th>Roll</th>
            <th>Aktiv</th>
            <th>Skapad</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>
