<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Location Assigner{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/panels.css" />
  <link rel="stylesheet" href="/static/css/modals.css" />
  {% block styles %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">Location Assigner</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/map">Map</a></li>
      <li><a href="/database">.db</a></li>
    </ul>
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.querySelectorAll(".nav-links a").forEach(a => {
      if (a.pathname === location.pathname) a.classList.add("active");
    });
</script>
  {% block scripts %}{% endblock %}
</body>
</html>
