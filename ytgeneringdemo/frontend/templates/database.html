{% extends "base.html" %}
{% block title %}Database — Location Assigner{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/database.css" />
{% endblock %}

{% block content %}
<div class="db-page">
  <nav class="db-subnav">
    <ul class="db-subnav-list" id="db-table-list"></ul>
  </nav>

  <div class="db-main" id="db-main">
    <div class="db-toolbar" id="db-toolbar" style="display:none;"></div>
    <div class="db-table-wrap" id="db-table-wrap" style="display:none;"></div>
    <div class="db-pagination" id="db-pagination" style="display:none;"></div>
    <div class="db-empty" id="db-empty">Select a table to browse</div>
  </div>
</div>

<div class="db-filter-dropdown" id="db-filter-dropdown"></div>

<div class="db-col-menu" id="db-col-menu">
  <button class="db-col-menu-item" id="col-menu-rename">Rename column</button>
  <button class="db-col-menu-item db-col-menu-item--danger" id="col-menu-drop">Drop column</button>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/database.js">
</script>
{% endblock %}
