name: Windows release package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r requirements-dev.txt
          python -m playwright install chromium

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
          BEMANNING_DISABLE_UPDATE_CHECK: "1"
          SECRET_KEY: test-secret
          SUPER_USER_USERNAMES: admin,emikad,mikhal
          EXCEL_API_TOKEN: test-token
        run: python -m pytest

      - name: Check frontend JavaScript syntax
        shell: pwsh
        run: |
          Get-ChildItem -Path app\frontend\js -Filter *.js | ForEach-Object { node --check $_.FullName }

      - name: Run desktop smoke test
        run: python desktop\main.py --smoke-test

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build app package
        shell: cmd
        run: build_windows.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flow-windows
          path: |
            release/flow-*-win64.zip
            release/flow-*-Setup.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "flow $tag" --generate-notes
          }
          gh release upload $tag release/flow-*-win64.zip release/flow-*-Setup.exe --clobber
