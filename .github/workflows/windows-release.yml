name: Windows release package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build app package
        shell: cmd
        run: build_windows.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bemanning-windows
          path: |
            release/Bemanning-*-win64.zip
            release/Bemanning-*-Setup.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Bemanning $tag" --generate-notes
          }
          gh release upload $tag release/Bemanning-*-win64.zip release/Bemanning-*-Setup.exe --clobber
