<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Personer · Demo</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Personer</h1>
          <p class="page-sub" id="countLabel">17 aktiva personer</p>
        </div>
        <div class="toolbar-group">
          <button class="btn ghost"><span>⬇</span> Exportera</button>
          <button class="btn primary" id="newBtn">+ Ny person</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <input class="field compact" type="text" placeholder="🔍 Sök i alla kolumner…" id="searchInput" style="width: 280px;" />
        </div>
        <div class="toolbar-group">
          <label style="display: flex; gap: 6px; align-items: center; color: var(--text-muted); font-size: 12px;">
            <input type="checkbox" id="showInactive" /> Visa inaktiva
          </label>
        </div>
      </div>

      <div class="card" style="overflow: auto;">
        <table class="data" id="personsTable">
          <thead>
            <tr>
              <th data-sort="name">Namn <span class="sort-ind">▲</span></th>
              <th data-sort="home_area">Hemområde <span class="sort-ind"></span></th>
              <th data-sort="home_activity">Huvudställe <span class="sort-ind"></span></th>
              <th data-sort="is_active">Status <span class="sort-ind"></span></th>
              <th data-sort="sort_order">Sortering <span class="sort-ind"></span></th>
              <th style="text-align: right;">Åtgärder</th>
            </tr>
            <tr class="filter-row">
              <td><input class="field compact" data-filter="name" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="home_area" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="home_activity" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="is_active" placeholder="ja / nej" /></td>
              <td><input class="field compact" data-filter="sort_order" placeholder="Filtrera…" /></td>
              <td></td>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="assets/demo.js"></script>
  <script>
    renderSidebar("persons");

    let sortKey = "sort_order";
    let sortAsc = true;
    const filters = {};

    function renderTable() {
      const list = PERSONS.filter(p => {
        if (filters.name && !p.name.toLowerCase().includes(filters.name.toLowerCase())) return false;
        if (filters.home_area && !(areaById(p.home_area_id)?.name || "").toLowerCase().includes(filters.home_area.toLowerCase())) return false;
        if (filters.home_activity && !(activityById(p.home_activity_id)?.label || "").toLowerCase().includes(filters.home_activity.toLowerCase())) return false;
        if (filters.is_active && !((p.is_active ? "ja" : "nej").includes(filters.is_active.toLowerCase()))) return false;
        if (filters.sort_order && !String(p.sort_order).includes(filters.sort_order)) return false;
        return true;
      });

      const getVal = (p) => {
        switch (sortKey) {
          case "name": return p.name.toLowerCase();
          case "home_area": return (areaById(p.home_area_id)?.name || "").toLowerCase();
          case "home_activity": return (activityById(p.home_activity_id)?.label || "").toLowerCase();
          case "is_active": return p.is_active ? 1 : 0;
          default: return p.sort_order;
        }
      };
      list.sort((a, b) => {
        const av = getVal(a), bv = getVal(b);
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ? 1 : -1;
        return 0;
      });

      const tbody = document.querySelector("#personsTable tbody");
      tbody.innerHTML = "";
      list.forEach(p => {
        const home = areaById(p.home_area_id);
        const act = activityById(p.home_activity_id);
        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td><strong>${escapeHtml(p.name)}</strong></td>
            <td>${home ? `<span class="tag area">${escapeHtml(home.name)}</span>` : "—"}</td>
            <td>${act ? `<span class="swatch" style="background: ${act.color}"></span>${escapeHtml(act.label)}` : "—"}</td>
            <td>${p.is_active ? '<span class="tag success">Aktiv</span>' : '<span class="tag danger">Inaktiv</span>'}</td>
            <td>${p.sort_order}</td>
            <td style="text-align: right; white-space: nowrap;">
              <button class="btn ghost sm">Schema</button>
              <button class="btn ghost sm">Redigera</button>
              <button class="btn ghost sm danger">Inaktivera</button>
            </td>
          </tr>
        `);
      });

      // Sort-indikatorer
      document.querySelectorAll("th[data-sort]").forEach(th => {
        const ind = th.querySelector(".sort-ind");
        ind.textContent = th.dataset.sort === sortKey ? (sortAsc ? "▲" : "▼") : "";
      });
    }

    document.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        if (sortKey === th.dataset.sort) sortAsc = !sortAsc;
        else { sortKey = th.dataset.sort; sortAsc = true; }
        renderTable();
      });
    });

    document.querySelectorAll("[data-filter]").forEach(inp => {
      inp.addEventListener("input", e => {
        filters[e.target.dataset.filter] = e.target.value;
        renderTable();
      });
    });

    document.getElementById("searchInput").addEventListener("input", e => {
      filters.name = e.target.value;
      document.querySelector("[data-filter='name']").value = e.target.value;
      renderTable();
    });

    document.getElementById("newBtn").addEventListener("click", () => openPersonModal());

    function openPersonModal(person) {
      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `
        <div class="modal">
          <h3>${person ? "Redigera person" : "Ny person"}</h3>
          <label class="field-label">Namn</label>
          <input class="field" style="width: 100%;" value="${escapeHtml(person?.name || "")}" />
          <div class="form-row">
            <div>
              <label class="field-label">Hemområde</label>
              <select class="field" style="width: 100%;">
                <option value="">(inget)</option>
                ${AREAS.map(a => `<option value="${a.id}" ${person?.home_area_id === a.id ? "selected" : ""}>${a.name}</option>`).join("")}
              </select>
            </div>
            <div>
              <label class="field-label">Huvudställe</label>
              <select class="field" style="width: 100%;">
                <option value="">(inget)</option>
                ${ACTIVITIES.map(a => `<option value="${a.id}" ${person?.home_activity_id === a.id ? "selected" : ""}>${a.label}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="form-row">
            <div>
              <label class="field-label">Sortering</label>
              <input class="field" type="number" value="${person?.sort_order || 0}" style="width: 100%;" />
            </div>
            <div>
              <label class="field-label">Status</label>
              <label style="display: flex; align-items: center; gap: 8px; padding-top: 9px; color: var(--text);">
                <input type="checkbox" ${person?.is_active !== false ? "checked" : ""} /> Aktiv
              </label>
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn ghost" id="cancelBtn">Avbryt</button>
            <button class="btn primary">Spara</button>
          </div>
        </div>`;
      document.body.appendChild(backdrop);
      backdrop.addEventListener("click", e => { if (e.target === backdrop) backdrop.remove(); });
      backdrop.querySelector("#cancelBtn").addEventListener("click", () => backdrop.remove());
    }

    renderTable();
  </script>
</body>
</html>
