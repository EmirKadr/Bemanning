<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Ställen · Demo</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Ställen &amp; aktiviteter</h1>
          <p class="page-sub" id="countLabel">18 aktiva aktiviteter över 3 områden</p>
        </div>
        <div class="toolbar-group">
          <button class="btn primary" id="newBtn">+ Ny aktivitet</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <input class="field compact" type="text" placeholder="🔍 Sök i alla kolumner…" id="searchInput" style="width: 280px;" />
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Område</span>
          <select class="field compact" id="areaFilter">
            <option value="">Alla</option>
            <option value="1">Granngården</option>
            <option value="2">Mestergruppen</option>
            <option value="3">Autostore</option>
            <option value="none">Frånvaro</option>
          </select>
        </div>
        <div class="toolbar-group">
          <label style="display: flex; gap: 6px; align-items: center; color: var(--text-muted); font-size: 12px;">
            <input type="checkbox" id="showInactive" /> Visa inaktiva
          </label>
        </div>
      </div>

      <div class="card" style="overflow: auto;">
        <table class="data" id="actsTable">
          <thead>
            <tr>
              <th style="width: 70px;">Färg</th>
              <th data-sort="label">Etikett <span class="sort-ind">▲</span></th>
              <th data-sort="code">Kod <span class="sort-ind"></span></th>
              <th data-sort="area">Område <span class="sort-ind"></span></th>
              <th data-sort="category">Typ <span class="sort-ind"></span></th>
              <th data-sort="sort_order">Sortering <span class="sort-ind"></span></th>
              <th data-sort="is_active">Status <span class="sort-ind"></span></th>
              <th style="text-align: right;">Åtgärder</th>
            </tr>
            <tr class="filter-row">
              <td></td>
              <td><input class="field compact" data-filter="label" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="code" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="area" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="category" placeholder="arbete / frånvaro" /></td>
              <td><input class="field compact" data-filter="sort_order" placeholder="Filtrera…" /></td>
              <td><input class="field compact" data-filter="is_active" placeholder="ja / nej" /></td>
              <td></td>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="assets/demo.js"></script>
  <script>
    renderSidebar("places");

    let sortKey = "label";
    let sortAsc = true;
    const filters = {};
    let areaFilter = "";

    // Lägg fält category till mock om saknas
    ACTIVITIES.forEach(a => {
      a.is_active = true;
      a.sort_order = a.id;
      a.category = a.area_id ? "arbete" : "frånvaro";
    });

    function renderTable() {
      let list = ACTIVITIES.slice();
      if (areaFilter === "none") list = list.filter(a => a.area_id == null);
      else if (areaFilter) list = list.filter(a => a.area_id === Number(areaFilter));

      list = list.filter(a => {
        if (filters.label && !a.label.toLowerCase().includes(filters.label.toLowerCase())) return false;
        if (filters.code && !a.code.toLowerCase().includes(filters.code.toLowerCase())) return false;
        if (filters.area) {
          const areaName = areaById(a.area_id)?.name || "frånvaro";
          if (!areaName.toLowerCase().includes(filters.area.toLowerCase())) return false;
        }
        if (filters.category && !a.category.toLowerCase().includes(filters.category.toLowerCase())) return false;
        if (filters.sort_order && !String(a.sort_order).includes(filters.sort_order)) return false;
        if (filters.is_active && !((a.is_active ? "ja" : "nej").includes(filters.is_active.toLowerCase()))) return false;
        return true;
      });

      const getVal = (a) => {
        switch (sortKey) {
          case "label": return a.label.toLowerCase();
          case "code": return a.code.toLowerCase();
          case "area": return (areaById(a.area_id)?.name || "zzz").toLowerCase();
          case "category": return a.category;
          case "is_active": return a.is_active ? 1 : 0;
          default: return a.sort_order;
        }
      };
      list.sort((a, b) => {
        const av = getVal(a), bv = getVal(b);
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ? 1 : -1;
        return 0;
      });

      const tbody = document.querySelector("#actsTable tbody");
      tbody.innerHTML = "";
      list.forEach(a => {
        const area = areaById(a.area_id);
        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td><div style="width: 30px; height: 20px; border-radius: 6px; background: ${a.color}; border: 1px solid rgba(0,0,0,.08);"></div></td>
            <td><strong>${escapeHtml(a.label)}</strong></td>
            <td><code style="background: var(--bg-2); padding: 2px 6px; border-radius: 4px; font-size: 11px;">${escapeHtml(a.code)}</code></td>
            <td>${area ? `<span class="tag area">${escapeHtml(area.name)}</span>` : '<span class="tag">Frånvaro</span>'}</td>
            <td><span class="tag">${escapeHtml(a.category)}</span></td>
            <td>${a.sort_order}</td>
            <td>${a.is_active ? '<span class="tag success">Aktiv</span>' : '<span class="tag danger">Inaktiv</span>'}</td>
            <td style="text-align: right; white-space: nowrap;">
              <button class="btn ghost sm">Redigera</button>
              <button class="btn ghost sm danger">Inaktivera</button>
            </td>
          </tr>
        `);
      });

      document.querySelectorAll("th[data-sort]").forEach(th => {
        const ind = th.querySelector(".sort-ind");
        ind.textContent = th.dataset.sort === sortKey ? (sortAsc ? "▲" : "▼") : "";
      });
    }

    document.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        if (sortKey === th.dataset.sort) sortAsc = !sortAsc;
        else { sortKey = th.dataset.sort; sortAsc = true; }
        renderTable();
      });
    });
    document.querySelectorAll("[data-filter]").forEach(inp => {
      inp.addEventListener("input", e => {
        filters[e.target.dataset.filter] = e.target.value;
        renderTable();
      });
    });
    document.getElementById("areaFilter").addEventListener("change", e => {
      areaFilter = e.target.value;
      renderTable();
    });
    document.getElementById("searchInput").addEventListener("input", e => {
      filters.label = e.target.value;
      document.querySelector("[data-filter='label']").value = e.target.value;
      renderTable();
    });
    document.getElementById("newBtn").addEventListener("click", () => openModal());

    function openModal(act) {
      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `
        <div class="modal">
          <h3>${act ? "Redigera aktivitet" : "Ny aktivitet"}</h3>
          <div class="form-row">
            <div>
              <label class="field-label">Etikett</label>
              <input class="field" style="width: 100%;" value="${escapeHtml(act?.label || "")}" />
            </div>
            <div>
              <label class="field-label">Kod</label>
              <input class="field" style="width: 100%;" value="${escapeHtml(act?.code || "")}" ${act ? "readonly" : ""} />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label class="field-label">Område</label>
              <select class="field" style="width: 100%;">
                <option value="">(inget)</option>
                ${AREAS.map(a => `<option value="${a.id}">${a.name}</option>`).join("")}
              </select>
            </div>
            <div>
              <label class="field-label">Färg</label>
              <input class="field" type="color" value="${act?.color || "#dbeafe"}" style="width: 100%; height: 38px;" />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label class="field-label">Sortering</label>
              <input class="field" type="number" value="${act?.sort_order || 0}" style="width: 100%;" />
            </div>
            <div>
              <label class="field-label">Typ</label>
              <select class="field" style="width: 100%;">
                <option value="arbete">Arbete</option>
                <option value="frånvaro">Frånvaro</option>
              </select>
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn ghost" id="cancelBtn">Avbryt</button>
            <button class="btn primary">Spara</button>
          </div>
        </div>`;
      document.body.appendChild(backdrop);
      backdrop.addEventListener("click", e => { if (e.target === backdrop) backdrop.remove(); });
      backdrop.querySelector("#cancelBtn").addEventListener("click", () => backdrop.remove());
    }

    renderTable();
  </script>
</body>
</html>
