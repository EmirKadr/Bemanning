<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Översikt · Demo</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Översikt</h1>
          <p class="page-sub" id="periodLabel">Vecka 20 · 12–18 maj · Granngården</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">Vy</span>
          <select class="field compact" id="viewMode">
            <option value="week" selected>Vecka</option>
            <option value="month">Månad</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button class="btn icon-only sm" id="prevBtn">◀</button>
          <input class="field compact" type="number" value="2026" style="width: 80px;" id="yearInput" />
          <input class="field compact" type="number" value="20"   style="width: 60px;" id="weekInput" />
          <select class="field compact" id="monthInput" style="display: none;">
            <option value="5" selected>Maj</option>
          </select>
          <button class="btn icon-only sm" id="nextBtn">▶</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Område</span>
          <select class="field compact" id="areaSelect">
            <option value="">Alla</option>
            <option value="1" selected>Granngården</option>
            <option value="2">Mestergruppen</option>
            <option value="3">Autostore</option>
          </select>
        </div>
        <div class="toolbar-group" style="margin-left: auto;">
          <input class="field compact" type="text" placeholder="🔍 Sök person…" id="searchInput" style="width: 200px;" />
        </div>
      </div>

      <div class="overview-wrap">
        <table class="overview" id="overviewTable">
          <thead><tr id="ovHead"><th class="name">Person ↑</th></tr></thead>
          <tbody id="ovBody"></tbody>
        </table>
      </div>

      <p class="page-sub" style="margin-top: 12px;">
        Klicka i en cell för att bemanna hela dagen enligt personens veckomall.
        Saknar personen mall används 07–16 (8 h med 1 h lunch kl 12).
      </p>
    </main>
  </div>

  <script src="assets/demo.js"></script>
  <script>
    renderSidebar("overview");

    // Mock per-dag-status för veckovyn:
    // Måndag: dagens schedule. Tis-Fre: olika mock.
    const overviewMock = {};
    [1,2,3,4,5,6,7].forEach(wd => {
      overviewMock[wd] = {};
      PERSONS.forEach(p => {
        if (wd >= 6) {
          overviewMock[wd][p.id] = { state: "off" };
          return;
        }
        const r = (p.id + wd) % 7;
        if (r === 0) overviewMock[wd][p.id] = { state: "scheduled" };
        else if (r === 5) overviewMock[wd][p.id] = { state: "off" };
        else if (r === 4) overviewMock[wd][p.id] = { state: "mixed", activity_id: p.home_activity_id, hours: 5 };
        else overviewMock[wd][p.id] = { state: "filled", activity_id: p.home_activity_id, hours: 8 };
      });
    });

    let selectedAreaId = 1;
    let search = "";
    let view = "week";

    function buildHeader() {
      const head = document.getElementById("ovHead");
      head.innerHTML = '<th class="name">Person</th>';
      if (view === "week") {
        for (let i = 1; i <= 7; i++) {
          const date = 11 + i;
          const th = document.createElement("th");
          if (i >= 6) th.className = "weekend";
          th.innerHTML = `<div>${DAYS[i].slice(0,3)}</div><div style="font-weight: 400; color: var(--text-soft); font-size: 11px;">${date} maj</div>`;
          head.appendChild(th);
        }
      } else {
        // Månad: 31 dagar
        for (let d = 1; d <= 31; d++) {
          const wd = ((d - 1) % 7) + 1;
          const th = document.createElement("th");
          if (wd >= 6) th.className = "weekend";
          th.style.minWidth = "70px";
          th.innerHTML = `<div style="font-size: 11px;">${DAYS[wd].slice(0,2)}</div><div style="font-weight: 700;">${d}</div>`;
          head.appendChild(th);
        }
      }
    }

    function buildBody() {
      const body = document.getElementById("ovBody");
      body.innerHTML = "";
      const visible = PERSONS.filter(p => {
        if (selectedAreaId && p.home_area_id !== selectedAreaId) return false;
        if (search && !p.name.toLowerCase().includes(search)) return false;
        return true;
      });
      visible.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="name">${escapeHtml(p.name)}</td>`;
        const days = view === "week" ? [1,2,3,4,5,6,7] : Array.from({length: 31}, (_, i) => ((i % 7) + 1));
        days.forEach((wd, idx) => {
          const m = overviewMock[wd]?.[p.id] || { state: "scheduled" };
          const td = document.createElement("td");
          td.className = "day";
          if (m.state === "filled") {
            td.classList.add("has-val");
            const a = activityById(m.activity_id);
            td.style.setProperty("--cell-bg", a?.color || "#fff");
            td.innerHTML = `<div class="day-label">${escapeHtml(a?.label || "")}</div><div class="day-meta">${m.hours} h</div>`;
          } else if (m.state === "mixed") {
            td.classList.add("day-mixed");
            td.innerHTML = `<div class="day-label">Blandat</div><div class="day-meta">${m.hours} h</div>`;
          } else if (m.state === "off") {
            td.classList.add("day-off");
            td.innerHTML = `<div class="day-label">Ledig</div>`;
          } else {
            td.classList.add("day-scheduled");
            const ha = activityById(p.home_activity_id);
            td.innerHTML = `<div class="day-label" style="color: var(--text-soft);">${escapeHtml(ha?.label || "")}</div><div class="day-meta">Schemalagd · 8 h</div>`;
          }
          td.addEventListener("click", () => toast(`${p.name} · ${view === "week" ? DAYS[wd] : `${idx+1} maj`}`));
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    }

    document.getElementById("viewMode").addEventListener("change", e => {
      view = e.target.value;
      document.getElementById("weekInput").style.display = view === "week" ? "" : "none";
      document.getElementById("monthInput").style.display = view === "month" ? "" : "none";
      document.getElementById("periodLabel").textContent = view === "week"
        ? "Vecka 20 · 12–18 maj · Granngården"
        : "Maj 2026 · Granngården";
      buildHeader();
      buildBody();
    });
    document.getElementById("areaSelect").addEventListener("change", e => {
      selectedAreaId = e.target.value ? Number(e.target.value) : null;
      buildBody();
    });
    document.getElementById("searchInput").addEventListener("input", e => {
      search = e.target.value.toLowerCase().trim();
      buildBody();
    });

    buildHeader();
    buildBody();
  </script>
</body>
</html>
